<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 344 72" width="344" height="72" role="img" aria-label="Credit for Credit">
  <title>Credit for Credit</title>
  <defs>
    <linearGradient id="cfcMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b52ee"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
  </defs>

  <!-- Mark: credits accumulating -->
  <g transform="translate(4 8)">
    <rect width="56" height="56" rx="16" fill="url(#cfcMark)"/>
    <rect x="14" y="32" width="8" height="10" rx="4" fill="#ffffff" opacity=".45"/>
    <rect x="26" y="24" width="8" height="18" rx="4" fill="#ffffff" opacity=".75"/>
    <rect x="38" y="16" width="8" height="26" rx="4" fill="#f0b429"/>
    <circle cx="42" cy="9" r="3.2" fill="#f0b429"/>
  </g>

  <!-- Wordmark -->
  <text x="76" y="36" font-family="Poppins,'Segoe UI',-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif"
        font-size="26" font-weight="700" letter-spacing="-.4">
    <tspan fill="#1f2733">Credit</tspan><tspan fill="#f0b429" dx="7" font-size="22" font-weight="600">for</tspan><tspan fill="#4f46e5" dx="7">Credit</tspan>
  </text>
  <text x="78" y="55" font-family="Poppins,'Segoe UI',-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="2.5" fill="#6b7480">LEARN WHILE YOU EARN</text>
</svg>
