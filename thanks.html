<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you — SPS Academy</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fff;color:#2b2b2b;min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
  .card{max-width:520px}
  .tick{width:74px;height:74px;border-radius:50%;background:#1a1a1c;display:grid;place-items:center;margin:0 auto 24px}
  .tick svg{width:34px;height:34px}
  h1{font-size:30px;font-weight:800;color:#2e2e31;letter-spacing:-.01em;margin-bottom:14px}
  p{color:#5c5c5c;font-size:16px;line-height:1.6;margin-bottom:28px}
  a.btn{display:inline-block;background:#1a1a1c;color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:14px 28px;border-radius:30px;transition:background .2s}
  a.btn:hover{background:#000}
  .bar{height:3px;width:64px;background:linear-gradient(90deg,#ef6c1a,#4da446);margin:0 auto 30px;border-radius:3px}
</style>
</head>
<body>
  <div class="card">
    <div class="bar"></div>
    <div class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m20 6-11 11-5-5"/></svg></div>
    <h1>Thank you — we've got it</h1>
    <p>Your enquiry has been sent to our team. We'll be in touch shortly to help you put a credit-bearing module pathway in place.</p>
    <a class="btn" href="index.html#home">Back to home</a>
  </div>
</body>
</html>
