<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found</title>
<meta name="robots" content="noindex">
<!-- Served by Apache for ANY missing path, so asset links must be absolute —
     relative ones would resolve against the bad URL and load nothing. -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<script src="/brand.js"></script>
</head>
<body data-page="" data-title="Page not found">

<nav id="nav"></nav>
<script>SITE.renderNav()</script>

<section class="pagehead">
  <div class="wrap">
    <div class="crumb"><a href="/">Home</a><span>›</span><span class="cur">Not found</span></div>
    <h1>We can't find that page</h1>
    <p class="lead">The link may be out of date, or the address slightly off. Nothing you've earned is affected — let's get you back on track.</p>
  </div>
  <div class="hero-curve"><svg viewBox="0 0 1440 56" preserveAspectRatio="none"><path d="M0,56 L0,26 C320,58 560,58 720,40 C900,20 1160,10 1440,38 L1440,56 Z" fill="#ffffff"/></svg></div>
</section>

<section>
  <div class="wrap">
    <div class="sec-head reveal">
      <span class="eyebrow">Try one of these</span>
      <h2>Where would you like to go?</h2>
    </div>
    <div class="hero-cta" style="margin-top:0">
      <a href="/" class="btn btn-primary">Home</a>
      <a href="/modules" class="btn btn-soft">Browse modules</a>
      <a href="/record" class="btn btn-soft">Your credit record</a>
      <a href="/contact" class="btn btn-ghost">Talk to our team</a>
    </div>
  </div>
</section>

<footer id="siteFooter"></footer>
<script>SITE.renderFooter()</script>
</body>
</html>
